version: '3.8'

services:
  postgres:
    image: docker.io/library/postgres:16-alpine
    container_name: zzrpg-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password123
      POSTGRES_DB: zzrpg
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: always

  redis:
    image: docker.io/library/redis:7-alpine
    container_name: zzrpg-redis
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    restart: always

volumes:
  pgdata:
    driver: local
  redisdata:
    driver: local
