<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>zzrpg — Admin Dashboard</title>
<meta name="description" content="Operator control panel: plugin catalog, activation toggles, and health." />
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
<style>
  :root {
    --bg: #0b0f17;
    --panel: #121826;
    --panel-2: #161f30;
    --border: #232d3f;
    --text: #e6ebf5;
    --muted: #8a97ab;
    --accent: #6d8dff;
    --ok: #2fbf71;
    --warn: #e0a92d;
    --err: #e5484d;
    --mono: 'SFMono-Regular', Consolas, 'Liberation Mono', Menlo, monospace;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    min-height: 100vh;
  }
  header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 0.9rem 1.5rem; border-bottom: 1px solid var(--border);
    background: var(--panel); position: sticky; top: 0; z-index: 10;
  }
  .brand { display: flex; align-items: center; gap: 0.6rem; font-weight: 700; font-size: 1.05rem; }
  .brand i { color: var(--accent); }
  .status-strip { display: flex; align-items: center; gap: 1rem; font-size: 0.82rem; color: var(--muted); }
  .dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; margin-right: 0.35rem; }
  .dot.up { background: var(--ok); box-shadow: 0 0 6px var(--ok); }
  .dot.down { background: var(--err); box-shadow: 0 0 6px var(--err); }
  .dot.unknown { background: var(--muted); }
  #btn-logout { background: none; border: 1px solid var(--border); color: var(--muted); padding: 0.35rem 0.7rem; border-radius: 6px; cursor: pointer; font-size: 0.78rem; }
  #btn-logout:hover { color: var(--text); border-color: var(--accent); }

  main { max-width: 1100px; margin: 0 auto; padding: 1.5rem; }
  .toolbar { display: flex; gap: 0.75rem; margin-bottom: 1.25rem; flex-wrap: wrap; align-items: center; }
  .toolbar input[type=text] {
    flex: 1; min-width: 200px; background: var(--panel); border: 1px solid var(--border);
    color: var(--text); padding: 0.55rem 0.8rem; border-radius: 8px; font-size: 0.9rem;
  }
  .toolbar select {
    background: var(--panel); border: 1px solid var(--border); color: var(--text);
    padding: 0.55rem 0.8rem; border-radius: 8px; font-size: 0.9rem;
  }
  .summary { font-size: 0.82rem; color: var(--muted); white-space: nowrap; }

  .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 1rem; }
  .card {
    background: var(--panel); border: 1px solid var(--border); border-radius: 10px;
    padding: 1.1rem; display: flex; flex-direction: column; gap: 0.6rem;
  }
  .card.disabled { opacity: 0.55; }
  .card-head { display: flex; align-items: flex-start; justify-content: space-between; gap: 0.6rem; }
  .card-title { display: flex; align-items: center; gap: 0.6rem; }
  .card-title i { color: var(--accent); font-size: 1.1rem; width: 1.2rem; text-align: center; }
  .card-title h3 { margin: 0; font-size: 0.98rem; }
  .card-title .name { font-family: var(--mono); font-size: 0.72rem; color: var(--muted); }
  .badge {
    font-size: 0.68rem; padding: 0.15rem 0.5rem; border-radius: 999px; font-weight: 600;
    text-transform: uppercase; letter-spacing: 0.03em; white-space: nowrap;
  }
  .badge.active { background: rgba(47,191,113,0.15); color: var(--ok); }
  .badge.disabled { background: rgba(229,72,77,0.15); color: var(--err); }
  .badge.category { background: rgba(109,141,255,0.15); color: var(--accent); }
  .card-desc { font-size: 0.84rem; color: var(--muted); line-height: 1.4; flex: 1; }
  .card-deps { font-size: 0.72rem; color: var(--muted); font-family: var(--mono); }
  .card-endpoints { font-size: 0.72rem; font-family: var(--mono); color: var(--muted); background: var(--panel-2); border-radius: 6px; padding: 0.5rem 0.6rem; max-height: 90px; overflow-y: auto; }
  .card-endpoints div { white-space: nowrap; }
  .card-foot { display: flex; align-items: center; justify-content: space-between; margin-top: 0.2rem; }

  .switch { position: relative; width: 40px; height: 22px; }
  .switch input { opacity: 0; width: 0; height: 0; }
  .slider { position: absolute; inset: 0; background: var(--border); border-radius: 999px; cursor: pointer; transition: 0.15s; }
  .slider::before { content: ""; position: absolute; width: 16px; height: 16px; left: 3px; top: 3px; background: var(--muted); border-radius: 50%; transition: 0.15s; }
  input:checked + .slider { background: rgba(47,191,113,0.25); }
  input:checked + .slider::before { transform: translateX(18px); background: var(--ok); }
  input:disabled + .slider { cursor: not-allowed; opacity: 0.5; }

  #gate {
    position: fixed; inset: 0; background: var(--bg); display: flex; align-items: center;
    justify-content: center; z-index: 100;
  }
  #gate .box { background: var(--panel); border: 1px solid var(--border); border-radius: 12px; padding: 2rem; width: 340px; }
  #gate h2 { margin: 0 0 0.4rem; font-size: 1.05rem; }
  #gate p { margin: 0 0 1.1rem; color: var(--muted); font-size: 0.84rem; }
  #gate input { width: 100%; background: var(--panel-2); border: 1px solid var(--border); color: var(--text); padding: 0.6rem 0.8rem; border-radius: 8px; font-family: var(--mono); font-size: 0.85rem; margin-bottom: 0.7rem; }
  #gate button { width: 100%; background: var(--accent); border: none; color: #0b0f17; font-weight: 700; padding: 0.6rem; border-radius: 8px; cursor: pointer; font-size: 0.88rem; }
  #gate button:hover { filter: brightness(1.08); }
  #gate .err { color: var(--err); font-size: 0.78rem; margin-top: 0.6rem; min-height: 1em; }
  #gate .hidden { display: none; }

  .empty { text-align: center; color: var(--muted); padding: 3rem 0; font-size: 0.9rem; }
</style>
</head>
<body>

<div id="gate">
  <div class="box">
    <h2><i class="fa-solid fa-lock"></i>&nbsp; Admin access</h2>
    <p>Enter the operator key configured via <code>ADMIN_BYPASS_KEY</code> at boot.</p>
    <input id="gate-key" type="password" placeholder="Admin bypass key" autocomplete="off" />
    <button id="gate-submit">Unlock</button>
    <div class="err" id="gate-err"></div>
  </div>
</div>

<header class="hidden" id="app-header">
  <div class="brand"><i class="fa-solid fa-cubes"></i> zzrpg Admin</div>
  <div class="status-strip">
    <span id="status-db"><span class="dot unknown"></span>database</span>
    <span id="status-redis"><span class="dot unknown"></span>redis</span>
    <span id="status-node" style="font-family: var(--mono);"></span>
    <button id="btn-logout">Log out</button>
  </div>
</header>

<main class="hidden" id="app-main">
  <div class="toolbar">
    <input type="text" id="search" placeholder="Filter by name or description…" />
    <select id="category-filter"><option value="">All categories</option></select>
    <select id="status-filter">
      <option value="">All statuses</option>
      <option value="ACTIVE">Active</option>
      <option value="DISABLED">Disabled</option>
    </select>
    <span class="summary" id="summary"></span>
  </div>
  <div class="grid" id="grid"></div>
  <div class="empty hidden" id="empty">No plugins match the current filter.</div>
</main>

<script>
(() => {
  const KEY_STORAGE = 'zzrpg_admin_bypass_key';
  const gate = document.getElementById('gate');
  const gateKeyInput = document.getElementById('gate-key');
  const gateErr = document.getElementById('gate-err');
  const header = document.getElementById('app-header');
  const appMain = document.getElementById('app-main');
  let plugins = [];

  function authHeaders() {
    return { 'X-Admin-Bypass-Key': sessionStorage.getItem(KEY_STORAGE) || '' };
  }

  async function api(path, opts = {}) {
    const res = await fetch(path, { ...opts, headers: { ...authHeaders(), ...(opts.headers || {}) } });
    if (res.status === 401 || res.status === 503) {
      const body = await res.json().catch(() => ({}));
      throw new Error(body.error || ('HTTP ' + res.status));
    }
    return res.json();
  }

  async function tryUnlock(key) {
    sessionStorage.setItem(KEY_STORAGE, key);
    try {
      await loadPlugins();
      gate.classList.add('hidden');
      header.classList.remove('hidden');
      appMain.classList.remove('hidden');
      pollHealth();
      setInterval(pollHealth, 15000);
    } catch (e) {
      sessionStorage.removeItem(KEY_STORAGE);
      gateErr.textContent = e.message || 'Access denied.';
    }
  }

  document.getElementById('gate-submit').addEventListener('click', () => {
    const key = gateKeyInput.value.trim();
    if (!key) { gateErr.textContent = 'Enter a key.'; return; }
    gateErr.textContent = '';
    tryUnlock(key);
  });
  gateKeyInput.addEventListener('keydown', (e) => { if (e.key === 'Enter') document.getElementById('gate-submit').click(); });

  document.getElementById('btn-logout').addEventListener('click', () => {
    sessionStorage.removeItem(KEY_STORAGE);
    location.reload();
  });

  async function pollHealth() {
    try {
      const h = await api('/api/v1/admin/health');
      setDot('status-db', h.database === 'up');
      setDot('status-redis', h.redis === 'up');
      document.getElementById('status-node').textContent = h.node || '';
    } catch (e) {
      setDot('status-db', null); setDot('status-redis', null);
    }
  }
  function setDot(id, up) {
    const el = document.getElementById(id).querySelector('.dot');
    el.className = 'dot ' + (up === null ? 'unknown' : up ? 'up' : 'down');
  }

  async function loadPlugins() {
    const data = await api('/api/v1/admin/plugins');
    plugins = data.plugins || [];
    populateCategoryFilter();
    render();
  }

  function populateCategoryFilter() {
    const sel = document.getElementById('category-filter');
    const cats = [...new Set(plugins.map(p => p.admin?.category).filter(Boolean))].sort();
    sel.innerHTML = '<option value="">All categories</option>' + cats.map(c => `<option value="${c}">${c}</option>`).join('');
  }

  function render() {
    const q = document.getElementById('search').value.trim().toLowerCase();
    const cat = document.getElementById('category-filter').value;
    const status = document.getElementById('status-filter').value;

    const filtered = plugins.filter(p => {
      const info = p.admin || {};
      if (status && p.status !== status) return false;
      if (cat && info.category !== cat) return false;
      if (q && !(p.name.toLowerCase().includes(q) || (info.title || '').toLowerCase().includes(q) || (info.description || '').toLowerCase().includes(q))) return false;
      return true;
    });

    document.getElementById('summary').textContent =
      `${filtered.length} of ${plugins.length} plugins · ${plugins.filter(p => p.status === 'ACTIVE').length} active`;

    const grid = document.getElementById('grid');
    const empty = document.getElementById('empty');
    if (filtered.length === 0) {
      grid.innerHTML = '';
      empty.classList.remove('hidden');
      return;
    }
    empty.classList.add('hidden');
    grid.innerHTML = filtered.map(cardHTML).join('');

    grid.querySelectorAll('input[type=checkbox][data-plugin]').forEach(cb => {
      cb.addEventListener('change', () => toggle(cb.dataset.plugin, cb));
    });
  }

  function cardHTML(p) {
    const info = p.admin || {};
    const active = p.status === 'ACTIVE';
    const isCore = p.name === 'core';
    const endpoints = (info.endpoints || []).map(e => `<div>${escapeHTML(e)}</div>`).join('');
    return `
      <div class="card ${active ? '' : 'disabled'}">
        <div class="card-head">
          <div class="card-title">
            <i class="fa-solid ${info.icon || 'fa-puzzle-piece'}"></i>
            <div>
              <h3>${escapeHTML(info.title || p.name)}</h3>
              <div class="name">${escapeHTML(p.name)}</div>
            </div>
          </div>
          <span class="badge ${active ? 'active' : 'disabled'}">${p.status}</span>
        </div>
        ${info.category ? `<span class="badge category" style="align-self:flex-start">${escapeHTML(info.category)}</span>` : ''}
        <div class="card-desc">${escapeHTML(info.description || 'No description provided.')}</div>
        ${p.requires && p.requires.length ? `<div class="card-deps">requires: ${p.requires.map(escapeHTML).join(', ')}</div>` : ''}
        ${endpoints ? `<div class="card-endpoints">${endpoints}</div>` : ''}
        <div class="card-foot">
          <span style="font-size:0.72rem;color:var(--muted)">${isCore ? 'core cannot be disabled' : 'toggle activation'}</span>
          <label class="switch">
            <input type="checkbox" data-plugin="${escapeHTML(p.name)}" ${active ? 'checked' : ''} ${isCore ? 'disabled' : ''} />
            <span class="slider"></span>
          </label>
        </div>
      </div>`;
  }

  async function toggle(name, cb) {
    cb.disabled = true;
    try {
      await api(`/api/v1/admin/plugins/${encodeURIComponent(name)}/toggle`, { method: 'POST' });
      await loadPlugins();
    } catch (e) {
      alert('Toggle failed: ' + e.message);
      cb.checked = !cb.checked;
      cb.disabled = false;
    }
  }

  function escapeHTML(s) {
    return String(s).replace(/[&<>"']/g, c => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c]));
  }

  document.getElementById('search').addEventListener('input', render);
  document.getElementById('category-filter').addEventListener('change', render);
  document.getElementById('status-filter').addEventListener('change', render);

  const savedKey = sessionStorage.getItem(KEY_STORAGE);
  if (savedKey) { gateKeyInput.value = savedKey; tryUnlock(savedKey); }
})();
</script>

</body>
</html>
